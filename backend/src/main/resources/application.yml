spring:

  ai:
    vectorstore:
      qdrant:
        host: localhost
        port: 6334
        collection-name: resumes
        use-tls: false
        initialize-schema: true
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: mxbai-embed-large
      chat:
        options:
          model: llama3


  datasource:
    url: jdbc:postgresql://localhost:5432/hirepilot
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

        connection:
          autocommit: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.springframework.security: DEBUG


jwt:
  secret: zK9mP3qR7tY2wX5vN8jL4bC6dF0hJ1kM3nQ5rT7uW9x=
  access-token-expiration: 86400000   # 24 hours
  refresh-token-expiration: 604800000 # 7 days





